version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true
  output: build/docs/html

python:
  install:
    - requirements: docs/requirements-docs.txt
    - method: pip
      path: .
    - method: pip
      path: ./clients/python
    - method: pip
      path: ./worker
